apiVersion: 1

providers:
  - name: "Server Status"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards

  - name: 'Public'
    orgId: 1
    folder: 'ACARS'
    type: file
    disableDeletion: false
    editable: false
    options:
      path: /etc/grafana/provisioning/dashboards
