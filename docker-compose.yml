services:
  postgis:
    image: postgis/postgis:18-3.6
    platform: linux/amd64
    container_name: acars-postgis
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: acars
      POSTGRES_USER: acars
      POSTGRES_PASSWORD: acars
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - monitoring

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: "host"
    networks:
      - monitoring
    volumes:
      - /:/host:ro
      - /var/lib/node-exporter:/textfile:ro
    command:
      - "--path.rootfs=/host"
      - "--collector.textfile.directory=/textfile"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - monitoring
    ports:
      - "3000:3000"
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: developer
      GF_SECURITY_ADMIN_PASSWORD: acars
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_UID: acars-coverage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

networks:
  monitoring:
    driver: bridge

volumes:
  pgdata:
  prometheus_data:
  grafana_data: